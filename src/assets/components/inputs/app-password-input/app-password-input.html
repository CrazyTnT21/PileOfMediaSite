<span id="outline" class="input parent" part="outline">
  <label for="input" part="label"></label>
  <input id="input" class="control" part="inner-input">
  <app-button aria-label="Toggle show password" exportparts="button: eye-button">
    <slot name="eye-button">
      <span id="eye-icon" class="eye-closed-icon" part="icon"></span>
    </slot>
  </app-button>
</span>
